[build-system]
requires = ["hatchling>=1.27", "hatch-vcs>=0.5"]
build-backend = "hatchling.build"

[project]
name = "xym"
dynamic = ["version"]
description = "A tool to fetch and extract YANG modules from IETF RFCs and Drafts"
readme = "README.md"
requires-python = ">=3.4"
license = "BSD-3-Clause"
authors = [
  { name = "Jan Medved", email = "jmedved@cisco.com" },
]
dependencies = [
  "requests>=2.6",
  "pyang>=2.5.0",
  "lxml",
]
keywords = ["yang", "extraction"]
classifiers = [
  "License :: OSI Approved :: BSD License",
  "Programming Language :: Python :: 3",
]

[project.urls]
Homepage = "https://github.com/xym-tool/xym"
Repository = "https://github.com/xym-tool/xym"

[project.scripts]
xym = "xym.cli:run"

[tool.hatch.version]
source = "vcs"
tag-pattern = "^v(?P<version>[0-9]+\\.[0-9]+\\.[0-9]+(?:rc[0-9]+)?)$"

[tool.hatch.build.hooks.vcs]
version-file = "xym/_version.py"
template = '''
# file generated by vcs-versioning
# don't change, don't track in version control

__version__ = version = {version!r}
__version_tuple__ = version_tuple = {version_tuple!r}
__commit_id__ = commit_id = {scm_version.short_node!r}
'''

[tool.hatch.build.targets.sdist]
include = [
  "/LICENSE",
  "/README.md",
  "/pyproject.toml",
  "/test",
  "/xym",
]

[tool.hatch.build.targets.wheel]
packages = ["xym"]

[tool.hatch.envs.test.scripts]
run = "cd test && python -m unittest test"
